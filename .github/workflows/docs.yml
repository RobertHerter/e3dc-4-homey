name: Deploy documentation

on:
  push:
    branches: [master]
    paths:
      - "doku/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip
          cache-dependency-path: doku/requirements.txt

      - name: Install MkDocs
        run: pip install -r doku/requirements.txt

      - name: Build site
        run: mkdocs build -f doku/mkdocs.yml

      - uses: actions/upload-pages-artifact@v3
        with:
          path: doku/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment